{% extends "base.html" %}

{% block title %}{{ t.setup_title }} - GT Id{% endblock %}

{% block body %}
<div class="centered">
    <div class="centered-card">
        <div class="logo"><img src="/favicon.svg" alt="GT Id" class="logo-icon">Id</div>
        <h1>{{ t.setup_title }}</h1>
        <p class="subtitle">{{ t.setup_subtitle }}</p>
        {% if error %}
        <div class="alert alert-error">{{ error_message }}</div>
        {% endif %}
        <form method="POST" action="/setup">
            <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
            <div class="form-group">
                <label for="setup_token">{{ t.setup_token_label }}</label>
                <input class="form-input" type="text" id="setup_token" name="setup_token" placeholder="{{ t.setup_token_placeholder }}" value="{{ form_token | default(value='') }}" required autofocus>
            </div>
            <div class="form-group">
                <label for="email">{{ t.setup_email_label }}</label>
                <input class="form-input" type="email" id="email" name="email" placeholder="{{ t.setup_email_placeholder }}" value="{{ form_email | default(value='') }}" required>
            </div>
            <div class="form-group">
                <label for="display_name">{{ t.setup_name_label }}</label>
                <input class="form-input" type="text" id="display_name" name="display_name" placeholder="{{ t.setup_name_placeholder }}" value="{{ form_display_name | default(value='') }}">
            </div>
            <div class="form-group">
                <label for="password">{{ t.setup_password_label }}</label>
                <input class="form-input" type="password" id="password" name="password" placeholder="{{ t.setup_password_placeholder }}" required>
            </div>
            <button type="submit" class="btn btn-primary btn-block">{{ t.setup_submit }}</button>
        </form>
    </div>
</div>
{% endblock %}
