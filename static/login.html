{% extends "base.html" %}

{% block title %}{{ t.login_title }} — {{ t.app_name }}{% endblock %}

{% block body %}
<div class="centered">
    <div class="centered-card">
        <div class="logo">{{ t.app_name }}</div>
        <h1>{{ t.login_title }}</h1>
        <p class="subtitle">{{ t.login_subtitle }}</p>
        {% if error %}
        <div class="alert alert-error">{{ error_message }}</div>
        {% endif %}
        <form method="POST" action="/login">
            <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
            <div class="form-group">
                <label for="email">{{ t.login_email_label }}</label>
                <input class="form-input" type="email" id="email" name="email" placeholder="{{ t.login_email_placeholder }}" value="{{ form_email | default(value='') }}" required autofocus>
            </div>
            <div class="form-group">
                <label for="password">{{ t.login_password_label }}</label>
                <input class="form-input" type="password" id="password" name="password" placeholder="{{ t.login_password_placeholder }}" required>
            </div>
            {% if rid %}
            <input type="hidden" name="rid" value="{{ rid }}">
            {% endif %}
            <button type="submit" class="btn btn-primary btn-block">{{ t.login_submit }}</button>
        </form>
    </div>
</div>
{% endblock %}
